stages:
  ingest:
    cmd: python -m src.ingest
    deps:
      - data/raw/ratings.csv
      - src/ingest.py
      - src/config.py
    outs:
      - data/processed/ratings_clean.csv

  features:
    cmd: python -m src.features
    deps:
      - data/processed/ratings_clean.csv
      - src/features.py
    outs:
      - models/user_similarity.pkl

  train:
    cmd: python -m src.train_main
    deps:
      - models/user_similarity.pkl
      - data/processed/ratings_clean.csv
      - src/train.py
      - src/train_main.py
    outs:
      - models/model.pkl
      - models/metadata.json